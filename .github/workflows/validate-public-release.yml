name: Validate Public Release

on:
  pull_request:
    paths:
      - 'README.md'
      - 'CONTRIBUTING.md'
      - 'dataset/**'
      - 'dashboard/**'
      - 'results/**'
      - 'scripts/build_public_release.py'
      - 'scripts/prepare_dataset.py'
      - 'scripts/bake_dashboard_data.py'
      - '.github/workflows/validate-public-release.yml'
      - '.github/workflows/deploy-dashboard.yml'
  push:
    branches: [main]
    paths:
      - 'README.md'
      - 'CONTRIBUTING.md'
      - 'dataset/**'
      - 'dashboard/**'
      - 'results/**'
      - 'scripts/build_public_release.py'
      - 'scripts/prepare_dataset.py'
      - 'scripts/bake_dashboard_data.py'
      - '.github/workflows/validate-public-release.yml'
      - '.github/workflows/deploy-dashboard.yml'
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Build and validate public release
        run: python3 scripts/build_public_release.py
