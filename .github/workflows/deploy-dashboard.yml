name: Deploy Dashboard to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      # Re-deploy when dashboard source or data changes
      - 'dashboard/**'
      - 'dataset/**'
      - 'results/**'
      - 'scripts/build_public_release.py'
      - 'scripts/prepare_dataset.py'
      - 'scripts/bake_dashboard_data.py'
      - '.github/workflows/deploy-dashboard.yml'
  # Allow manual trigger from Actions tab
  workflow_dispatch:

permissions:
  contents: read
  pages:    write
  id-token: write

# Only one deployment at a time
concurrency:
  group:              pages
  cancel-in-progress: true

# Use Node.js 24 across all actions to avoid deprecation warnings
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Rebuild and validate public release
        run: python3 scripts/build_public_release.py

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Deploy the dashboard/ directory as the site root
          path: dashboard/

  deploy:
    needs:       build
    runs-on:     ubuntu-latest
    environment:
      name: github-pages
      url:  ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id:   deployment
        uses: actions/deploy-pages@v4
