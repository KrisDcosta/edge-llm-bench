  # ===================================================================
  # Phase B Extended Experiments — Novel contributions for paper
  # ===================================================================

  # --- Thread Count Scaling Sweep (Q4_K_M, ctx=256) ---
  # Pixel 6a: Tensor G2 = 2× Cortex-X1 (big) + 2× Cortex-A76 + 4× Cortex-A55 (LITTLE)
  # Tests ARM big.LITTLE parallelism scaling behaviour
  - id: q4km-threads-1
    quant_bits: 4
    gguf_variant: Q4_K_M
    context_length: 256
    output_length: 128
    threads: 1
    warmups: 1
    trials: 3
    prompt_set_id: prompt-suite-v1
    status: planned
    notes: "Thread sweep: 1 thread baseline"
  - id: q4km-threads-2
    quant_bits: 4
    gguf_variant: Q4_K_M
    context_length: 256
    output_length: 128
    threads: 2
    warmups: 1
    trials: 3
    prompt_set_id: prompt-suite-v1
    status: planned
    notes: "Thread sweep: 2 threads"
  - id: q4km-threads-4
    quant_bits: 4
    gguf_variant: Q4_K_M
    context_length: 256
    output_length: 128
    threads: 4
    warmups: 1
    trials: 3
    prompt_set_id: prompt-suite-v1
    status: planned
    notes: "Thread sweep: 4 threads (default — reference point)"
  - id: q4km-threads-8
    quant_bits: 4
    gguf_variant: Q4_K_M
    context_length: 256
    output_length: 128
    threads: 8
    warmups: 1
    trials: 3
    prompt_set_id: prompt-suite-v1
    status: planned
    notes: "Thread sweep: 8 threads (all cores including LITTLE cores)"

  # --- Extended Context to 2048 (Q2_K + Q4_K_M) ---
