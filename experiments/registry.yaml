# =============================================================================
# Experiment registry — llama.cpp + Llama 3.2 3B GGUF on Pixel 6a (Android/ARM64)
#
# Structure:
#   Each entry is one experiment run (one variant × one context window × one config).
#   Fields common to all entries:
#     id             — unique kebab-case identifier
#     gguf_variant   — quantization variant key (must exist in GGUF_DEVICE_PATHS)
#     quant_bits     — integer bit-width for bookkeeping
#     context_length — KV context window in tokens
#     output_length  — max tokens to generate per trial
#     warmups        — discarded warm-up runs before recorded trials
#     trials         — number of recorded runs per prompt
#     prompt_set_id  — which prompt suite to use
#     status         — planned | complete | failed | blocked | oom
#     notes          — optional free-text annotation
#
#   Optional fields (absent = disabled / default):
#     threads        — override default thread count (default: 4)
#     flash_attention: true  → pass -fa to llama-completion
#     kv_cache_type: "q8_0" → pass -ctk <type> to llama-completion
#     imatrix: true          → use importance-matrix calibrated model variant
#     model_name             → override model name (for cross-model experiments)
#
# Status values:
#   planned  — not yet run; will be included in --all sweeps
#   complete — data collected and validated
#   failed   — run attempted but data is bad / missing
#   blocked  — dependencies not met (e.g. model not on device)
#   oom      — run attempted; process killed by OOM
# =============================================================================

